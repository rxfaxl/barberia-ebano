{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Nueva Cita{% endblock %}

{% block content %}
<div class="row justify-content-center fade-in-up">
    <div class="col-md-8 col-lg-6">
        <div class="card">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <p class="section-subtitle">Reserva tu turno</p>
                    <h2 class="section-title" style="font-size: 1.8rem;">Agendar Cita</h2>
                    <div class="gold-divider"></div>
                </div>
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="alert mt-3">
                        <small><i class="bi bi-info-circle text-gold"></i> Las citas se confirman automáticamente. Solo debes presentarte el día agendado.</small>
                    </div>
                    <button type="submit" class="btn btn-gold w-100 mt-4">
                        <i class="bi bi-calendar-check"></i> Agendar
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
