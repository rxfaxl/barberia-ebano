{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Iniciar Sesión{% endblock %}

{% block content %}
<div class="row justify-content-center fade-in-up">
    <div class="col-md-6 col-lg-5">
        <div class="card">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <p class="section-subtitle">Acceso</p>
                    <h2 class="section-title" style="font-size: 1.8rem;">Iniciar Sesión</h2>
                    <div class="gold-divider"></div>
                </div>
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-gold w-100 mt-4">Entrar</button>
                </form>
                <p class="text-center mt-4 mb-0" style="color: var(--text-muted);">
                    ¿No tienes cuenta? <a href="{% url 'register' %}">Regístrate</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
